<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeInvest - Portfolio Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for the premium graph -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: white;
            -webkit-font-smoothing: antialiased;
        }

        /* Hardware Frame */
        .iphone-frame {
            width: 390px;
            height: 844px;
            background-color: #000000;
            border-radius: 50px;
            box-shadow: 0 0 0 12px #1e293b, 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            border: 2px solid #334155;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Premium Glassmorphism */
        .glass-panel {
            background: rgba(28, 28, 30, 0.55);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        /* Native iOS Segmented Control */
        .segmented-control {
            background-color: #1C1C1E;
            border-radius: 12px;
            padding: 3px;
            display: flex;
            position: relative;
        }

        .segment-btn {
            flex: 1;
            text-align: center;
            padding: 7px 0;
            font-size: 13px;
            font-weight: 600;
            color: #8E8E93;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            z-index: 2;
        }

        .segment-btn.active {
            color: white;
        }

        .segment-highlight {
            position: absolute;
            top: 3px;
            bottom: 3px;
            width: 20%;
            background-color: #3A3A3C;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1;
        }

        /* Asset Card Animation */
        .asset-card {
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .asset-card:active {
            transform: scale(0.96);
            background-color: rgba(255, 255, 255, 0.08);
        }

        /* Gradients */
        .icon-meta {
            background: linear-gradient(135deg, #0668E1, #00C6FF);
        }

        .icon-bdnce {
            background: #000000;
            border: 1px solid #333;
            position: relative;
        }

        .icon-bdnce::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            box-shadow: -1px -1px 0px #00f2fe, 1px 1px 0px #fe0979;
            opacity: 0.8;
        }

        .icon-googl {
            background: linear-gradient(135deg, #EA4335, #FBBC05, #34A853, #4285F4);
        }

        .icon-nflx {
            background: #E50914;
        }

        .icon-spt {
            background: #1DB954;
        }

        .icon-amzn {
            background: #FF9900;
        }

        /* Detail Modal Animation */
        .modal-sheet {
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .modal-sheet.open {
            transform: translateY(0);
        }

        .modal-backdrop {
            transition: opacity 0.4s ease;
        }

        .modal-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        /* View Switching Animation */
        .view-container {
            position: absolute;
            inset: 0;
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.4s ease;
        }

        .view-hidden-left {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .view-hidden-right {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
        }

        /* Custom Progress Ring for Stats */
        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.8s ease;
            stroke-linecap: round;
        }
    </style>
</head>

<body>

    <!-- iPhone Mockup Container -->
    <div class="iphone-frame flex flex-col">

        <!-- Hardware Notch -->
        <div class="absolute top-3 left-1/2 -translate-x-1/2 w-[120px] h-[32px] bg-black rounded-full z-[100]"></div>

        <!-- MAIN PORTFOLIO VIEW -->
        <div id="mainView" class="view-container flex flex-col z-10">
            <!-- Header (Search/Bell removed for clean look) -->
            <header class="px-6 pt-16 pb-2 relative">
                <h1 class="text-3xl font-extrabold tracking-tight">Portfolio</h1>
            </header>

            <!-- Scrollable Content -->
            <main class="flex-1 overflow-y-auto hide-scrollbar pb-10">
                <!-- Hero Balance -->
                <div class="px-6 pt-4 pb-4 flex flex-col items-center">
                    <p class="text-[12px] text-gray-500 font-bold uppercase tracking-[0.1em] mb-1">Portfolio Value</p>
                    <h2 class="text-[44px] font-black tracking-tighter text-white leading-none mb-2" id="mainBalance">
                        $1,428.50</h2>
                    <div
                        class="flex items-center gap-1.5 px-3 py-1.5 bg-[#30D158]/10 border border-[#30D158]/20 rounded-full text-[#30D158] font-bold text-[13px] shadow-[0_0_20px_rgba(48,209,88,0.1)]">
                        <i data-lucide="trending-up" class="w-4 h-4"></i>
                        <span id="mainReturn">+$124.20 (9.5%)</span>
                    </div>
                </div>

                <!-- Interactive Chart -->
                <div class="w-full h-[220px] relative px-2">
                    <canvas id="portfolioChart"></canvas>
                </div>

                <!-- Time Controls -->
                <div class="px-6 mt-2 mb-8">
                    <div class="segmented-control">
                        <div class="segment-highlight" id="timeHighlight"></div>
                        <button class="segment-btn" onclick="updateChartData(0, this)">1D</button>
                        <button class="segment-btn" onclick="updateChartData(1, this)">1W</button>
                        <button class="segment-btn active" onclick="updateChartData(2, this)">1M</button>
                        <button class="segment-btn" onclick="updateChartData(3, this)">3M</button>
                        <button class="segment-btn" onclick="updateChartData(4, this)">1Y</button>
                    </div>
                </div>

                <!-- Stat Widgets -->
                <div class="px-6 mb-8 grid grid-cols-2 gap-4">
                    <div class="glass-panel rounded-[24px] p-5 flex flex-col relative overflow-hidden">
                        <div class="flex justify-between items-start mb-4">
                            <div
                                class="w-10 h-10 rounded-2xl bg-blue-500/20 text-blue-400 flex items-center justify-center border border-blue-500/10">
                                <i data-lucide="history" class="w-5 h-5"></i></div>
                            <svg class="progress-ring" width="32" height="32">
                                <circle class="text-gray-800" stroke-width="3" stroke="currentColor" fill="transparent"
                                    r="12" cx="16" cy="16" />
                                <circle class="progress-ring-circle text-blue-500" stroke-width="3"
                                    stroke-dasharray="75.4" stroke-dashoffset="25" stroke="currentColor"
                                    fill="transparent" r="12" cx="16" cy="16" />
                            </svg>
                        </div>
                        <p class="text-[11px] text-gray-500 font-bold uppercase mb-1">Converted</p>
                        <h3 class="text-2xl font-black text-white leading-none">142.5<span
                                class="text-xs font-medium text-blue-400 ml-1">HRS</span></h3>
                    </div>
                    <div class="glass-panel rounded-[24px] p-5 flex flex-col relative overflow-hidden">
                        <div class="flex justify-between items-start mb-4">
                            <div
                                class="w-10 h-10 rounded-2xl bg-purple-500/20 text-purple-400 flex items-center justify-center border border-purple-500/10">
                                <i data-lucide="flame" class="w-5 h-5"></i></div>
                            <div
                                class="bg-purple-500/20 px-2 py-0.5 rounded text-[9px] font-black text-purple-300 border border-purple-500/20 uppercase">
                                Hot</div>
                        </div>
                        <p class="text-[11px] text-gray-500 font-bold uppercase mb-1">Top Engine</p>
                        <h3 class="text-2xl font-black text-white leading-none">TikTok</h3>
                    </div>
                </div>

                <!-- Holdings List Preview -->
                <div class="px-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[19px] font-black text-white tracking-tight">Holdings</h3>
                        <button
                            class="text-[13px] text-[#30D158] font-bold bg-[#30D158]/10 px-3 py-1 rounded-full active:scale-95 transition-transform"
                            onclick="showAllHoldings()">See All</button>
                    </div>
                    <div class="glass-panel rounded-[28px] overflow-hidden border border-white/5"
                        id="assetsPreviewContainer">
                        <!-- JS populated -->
                    </div>
                </div>

                <!-- Recent Activity Preview -->
                <div class="px-6 mt-10">
                    <div class="flex justify-between items-center mb-5">
                        <h3 class="text-[19px] font-black text-white tracking-tight">Recent Activity</h3>
                        <button
                            class="text-[13px] text-[#30D158] font-bold bg-[#30D158]/10 px-3 py-1 rounded-full active:scale-95 transition-transform"
                            onclick="showAllActivity()">See All</button>
                    </div>
                    <div class="flex flex-col gap-5" id="activityPreviewFeed"></div>
                </div>
            </main>
        </div>

        <!-- ALL HOLDINGS VIEW -->
        <div id="holdingsView" class="view-container view-hidden-right flex flex-col z-20 bg-[#050505]">
            <header class="px-6 pt-16 pb-4 flex items-center gap-4">
                <button onclick="hideAllHoldings()"
                    class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white active:scale-90 transition-transform">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </button>
                <h1 class="text-2xl font-black text-white tracking-tight">All Assets</h1>
            </header>

            <div class="px-6 mb-4">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500"></i>
                    <input type="text" placeholder="Search your portfolio..."
                        class="w-full bg-white/5 border border-white/10 rounded-2xl py-3 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none focus:border-[#30D158] transition-colors">
                </div>
            </div>

            <main class="flex-1 overflow-y-auto hide-scrollbar px-6 pb-10">
                <div class="glass-panel rounded-[28px] overflow-hidden border border-white/5" id="allAssetsContainer">
                    <!-- Full list populated here -->
                </div>
            </main>
        </div>

        <!-- ACTIVITY HISTORY VIEW -->
        <div id="activityView" class="view-container view-hidden-right flex flex-col z-30 bg-[#050505]">
            <header class="px-6 pt-16 pb-4 flex items-center gap-4">
                <button onclick="hideAllActivity()"
                    class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white active:scale-90 transition-transform">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </button>
                <h1 class="text-2xl font-black text-white tracking-tight">Activity History</h1>
            </header>

            <main class="flex-1 overflow-y-auto hide-scrollbar px-6 pb-10">
                <div id="fullActivityContainer" class="flex flex-col gap-8 pt-4">
                    <!-- Grouped activity generated here -->
                </div>
            </main>
        </div>

        <!-- ASSET DETAIL BOTTOM SHEET -->
        <div id="detailBackdrop"
            class="absolute inset-0 bg-black/70 backdrop-blur-md z-[200] opacity-0 pointer-events-none modal-backdrop"
            onclick="closeDetailModal()"></div>
        <div id="detailSheet"
            class="absolute bottom-0 left-0 right-0 bg-[#151517] rounded-t-[40px] z-[210] transform translate-y-full modal-sheet flex flex-col h-[90%] border-t border-white/10 shadow-2xl">
            <div class="w-12 h-1.5 bg-gray-600 rounded-full mx-auto mt-4 mb-2 flex-shrink-0"></div>
            <div class="flex-1 overflow-y-auto hide-scrollbar px-6 pb-10">
                <div class="flex items-center justify-between mt-6 mb-8">
                    <div class="flex items-center gap-4">
                        <div id="detailIcon"
                            class="w-16 h-16 rounded-[22px] flex items-center justify-center text-white font-bold text-2xl shadow-xl">
                        </div>
                        <div>
                            <h2 id="detailTicker" class="text-3xl font-black text-white leading-none"></h2>
                            <p id="detailName" class="text-gray-500 font-bold text-sm uppercase"></p>
                        </div>
                    </div>
                    <button onclick="closeDetailModal()"
                        class="w-10 h-10 rounded-full bg-gray-800/50 flex items-center justify-center text-gray-400"><i
                            data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="flex flex-col items-center mb-10">
                    <div class="text-[12px] text-gray-500 font-black uppercase tracking-widest mb-1">Market Value</div>
                    <div id="detailValue" class="text-5xl font-black text-white mb-2"></div>
                    <div id="detailReturn" class="px-3 py-1 rounded-full text-[13px] font-bold"></div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-10" id="detailGrid"></div>
                <h3 class="text-xl font-black text-white tracking-tight mb-4">Accumulation Log</h3>
                <div id="accumulationFeed" class="space-y-4"></div>
            </div>
        </div>

        <div
            class="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-black to-transparent pointer-events-none z-30">
        </div>
    </div>

    <!-- Templates -->
    <template id="assetTemplate">
        <div class="asset-card flex justify-between items-center p-4 border-b border-white/5 cursor-pointer"
            onclick="openDetailModal('{id}')">
            <div class="flex items-center gap-3.5">
                <div
                    class="w-12 h-12 rounded-[18px] flex items-center justify-center text-white font-bold text-lg {iconClass}">
                    {initial}</div>
                <div class="flex flex-col">
                    <span class="text-[16px] font-extrabold text-white leading-tight">{ticker}</span>
                    <span class="text-[12px] text-gray-500 font-semibold">{company}</span>
                </div>
            </div>
            <div class="w-14 h-8 opacity-60"><canvas id="sparkline-{canvasId}"></canvas></div>
            <div class="flex flex-col items-end">
                <span class="text-[16px] font-black text-white tracking-tighter">${value}</span>
                <span class="text-[11px] font-bold {returnClass} mt-1">{returnString}</span>
            </div>
        </div>
    </template>

    <script>
        lucide.createIcons();

        // MOCK DATA
        const holdings = [
            { id: 'meta', ticker: 'META', company: 'Meta Platforms', initial: 'M', iconClass: 'icon-meta', value: 840.20, returnPct: 12.4, shares: 1.7314, avgCost: 485.30, totalInvested: 747.70, rate: "$0.10 / min" },
            { id: 'bdnce', ticker: 'BDNCE', company: 'ByteDance', initial: 'B', iconClass: 'icon-bdnce', value: 410.80, returnPct: 4.2, shares: 8.2160, avgCost: 50.00, totalInvested: 394.20, rate: "$0.25 / min" },
            { id: 'googl', ticker: 'GOOGL', company: 'Alphabet Inc.', initial: 'G', iconClass: 'icon-googl', value: 125.00, returnPct: -1.5, shares: 0.8802, avgCost: 142.10, totalInvested: 126.90, rate: "$0.05 / min" },
            { id: 'nflx', ticker: 'NFLX', company: 'Netflix', initial: 'N', iconClass: 'icon-nflx', value: 52.50, returnPct: 8.9, shares: 0.0815, avgCost: 644.17, totalInvested: 48.20, rate: "$0.10 / min" },
            { id: 'spt', ticker: 'SPOT', company: 'Spotify', initial: 'S', iconClass: 'icon-spt', value: 38.40, returnPct: 15.2, shares: 0.12, avgCost: 320.00, totalInvested: 33.30, rate: "$0.05 / min" },
            { id: 'amzn', ticker: 'AMZN', company: 'Amazon', initial: 'A', iconClass: 'icon-amzn', value: 12.00, returnPct: 2.1, shares: 0.06, avgCost: 190.00, totalInvested: 11.75, rate: "$0.10 / min" }
        ];

        const activities = [
            {
                group: 'Today', items: [
                    { title: 'Auto-Invest BDNCE', desc: 'From 45m TikTok', amount: '+$11.25', time: 'Just Now', icon: 'zap', color: 'text-purple-400' },
                    { title: 'Auto-Invest META', desc: 'From 30m Instagram', amount: '+$3.00', time: '2:14 PM', icon: 'zap', color: 'text-[#30D158]' },
                    { title: 'SPOT Dividend', desc: 'Cash yield payout', amount: '+$0.14', time: '9:05 AM', icon: 'arrow-up-right', color: 'text-[#30D158]' }
                ]
            },
            {
                group: 'Yesterday', items: [
                    { title: 'Bank Deposit', desc: 'Chase •••• 4210', amount: '+$500.00', time: '4:20 PM', icon: 'plus-circle', color: 'text-blue-400' },
                    { title: 'Auto-Invest META', desc: 'From 12m Instagram', amount: '+$1.20', time: '11:15 AM', icon: 'zap', color: 'text-[#30D158]' },
                    { title: 'Auto-Invest GOOGL', desc: 'From 1h YouTube', amount: '+$6.00', time: '8:30 AM', icon: 'zap', color: 'text-red-400' }
                ]
            },
            {
                group: 'Earlier this Week', items: [
                    { title: 'Auto-Invest NFLX', desc: 'From 2h Netflix', amount: '+$12.00', time: 'Oct 25', icon: 'zap', color: 'text-red-600' },
                    { title: 'Auto-Invest BDNCE', desc: 'From 15m TikTok', amount: '+$3.75', time: 'Oct 24', icon: 'zap', color: 'text-purple-400' },
                    { title: 'Bank Deposit', desc: 'Chase •••• 4210', amount: '+$250.00', time: 'Oct 23', icon: 'plus-circle', color: 'text-blue-400' },
                    { title: 'AMZN Dividend', desc: 'Cash yield payout', amount: '+$0.08', time: 'Oct 23', icon: 'arrow-up-right', color: 'text-orange-400' }
                ]
            }
        ];

        // LOGIC
        function populateHoldings() {
            const preview = document.getElementById('assetsPreviewContainer');
            const all = document.getElementById('allAssetsContainer');
            const template = document.getElementById('assetTemplate').innerHTML;

            preview.innerHTML = ''; all.innerHTML = '';
            holdings.forEach((asset, index) => {
                const isPos = asset.returnPct >= 0;
                let html = template
                    .replace(/{id}/g, asset.id).replace(/{ticker}/g, asset.ticker).replace(/{company}/g, asset.company)
                    .replace(/{initial}/g, asset.initial).replace(/{iconClass}/g, asset.iconClass)
                    .replace(/{value}/g, asset.value.toFixed(2)).replace(/{returnClass}/g, isPos ? 'text-[#30D158]' : 'text-red-500')
                    .replace(/{returnString}/g, `${isPos ? '+' : ''}${asset.returnPct}%`);

                if (index < 4) {
                    let div = document.createElement('div');
                    div.innerHTML = html.replace(/{canvasId}/g, `prev-${asset.id}`);
                    if (index === 3) div.firstElementChild.classList.remove('border-b');
                    preview.appendChild(div.firstElementChild);
                    drawSparkline(`sparkline-prev-${asset.id}`, isPos);
                }

                let fullDiv = document.createElement('div');
                fullDiv.innerHTML = html.replace(/{canvasId}/g, `full-${asset.id}`);
                if (index === holdings.length - 1) fullDiv.firstElementChild.classList.remove('border-b');
                all.appendChild(fullDiv.firstElementChild);
                drawSparkline(`sparkline-full-${asset.id}`, isPos);
            });
        }

        function populateActivity() {
            const previewFeed = document.getElementById('activityPreviewFeed');
            const fullContainer = document.getElementById('fullActivityContainer');

            previewFeed.innerHTML = '';
            fullContainer.innerHTML = '';

            let count = 0;
            activities.forEach(group => {
                const groupEl = document.createElement('div');
                groupEl.innerHTML = `<h3 class="text-[12px] font-bold text-gray-500 uppercase tracking-widest mb-4 ml-1">${group.group}</h3>`;
                const listEl = document.createElement('div');
                listEl.className = 'flex flex-col gap-6 bg-white/[0.03] p-5 rounded-[28px] border border-white/5';

                group.items.forEach(item => {
                    const row = `
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <div class="w-11 h-11 rounded-[16px] bg-black/40 flex items-center justify-center ${item.color} shadow-lg"><i data-lucide="${item.icon}" class="w-5 h-5"></i></div>
                                <div><p class="text-[14px] font-extrabold text-white tracking-tight">${item.title}</p><p class="text-[11px] text-gray-500 font-medium">${item.desc}</p></div>
                            </div>
                            <div class="text-right"><p class="text-[14px] font-black text-white">${item.amount}</p><p class="text-[10px] text-gray-500 font-bold uppercase">${item.time}</p></div>
                        </div>`;

                    listEl.innerHTML += row;

                    if (count < 4) {
                        previewFeed.innerHTML += row;
                        count++;
                    }
                });
                groupEl.appendChild(listEl);
                fullContainer.appendChild(groupEl);
            });
        }

        function showAllHoldings() {
            document.getElementById('mainView').classList.add('view-hidden-left');
            document.getElementById('holdingsView').classList.remove('view-hidden-right');
        }
        function hideAllHoldings() {
            document.getElementById('mainView').classList.remove('view-hidden-left');
            document.getElementById('holdingsView').classList.add('view-hidden-right');
        }
        function showAllActivity() {
            document.getElementById('mainView').classList.add('view-hidden-left');
            document.getElementById('activityView').classList.remove('view-hidden-right');
        }
        function hideAllActivity() {
            document.getElementById('mainView').classList.remove('view-hidden-left');
            document.getElementById('activityView').classList.add('view-hidden-right');
        }

        function openDetailModal(id) {
            const asset = holdings.find(a => a.id === id);
            document.getElementById('detailTicker').innerText = asset.ticker;
            document.getElementById('detailName').innerText = asset.company;
            document.getElementById('detailIcon').className = `w-16 h-16 rounded-[22px] flex items-center justify-center text-white font-bold text-2xl shadow-xl ${asset.iconClass}`;
            document.getElementById('detailIcon').innerText = asset.initial;
            document.getElementById('detailValue').innerText = `$${asset.value.toFixed(2)}`;
            const isP = asset.returnPct >= 0;
            document.getElementById('detailReturn').className = `px-3 py-1 rounded-full text-[13px] font-bold ${isP ? 'bg-[#30D158]/10 text-[#30D158]' : 'bg-red-500/10 text-red-500'}`;
            document.getElementById('detailReturn').innerText = `${isP ? '↑' : '↓'} ${asset.returnPct}%`;
            document.getElementById('detailGrid').innerHTML = `
                <div class="bg-white/5 rounded-2xl p-4 border border-white/5"><p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Shares</p><p class="text-lg font-black text-white">${asset.shares}</p></div>
                <div class="bg-white/5 rounded-2xl p-4 border border-white/5"><p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Avg Cost</p><p class="text-lg font-black text-white">$${asset.avgCost.toFixed(2)}</p></div>
                <div class="bg-white/5 rounded-2xl p-4 border border-white/5"><p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Invested</p><p class="text-lg font-black text-white">$${asset.totalInvested.toFixed(2)}</p></div>
                <div class="bg-white/5 rounded-2xl p-4 border border-white/5"><p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Rate</p><p class="text-lg font-black text-[#30D158]">${asset.rate}</p></div>`;
            renderAccumulationLog();
            document.getElementById('detailBackdrop').classList.add('open');
            document.getElementById('detailSheet').classList.add('open');
            lucide.createIcons();
        }
        function closeDetailModal() { document.getElementById('detailBackdrop').classList.remove('open'); document.getElementById('detailSheet').classList.remove('open'); }

        function renderAccumulationLog() {
            const feed = document.getElementById('accumulationFeed');
            feed.innerHTML = `
                <div class="flex justify-between items-center p-4 bg-white/[0.03] rounded-2xl border border-white/[0.05]">
                    <div><span class="text-white font-bold text-sm">Instagram Converted</span><br><span class="text-gray-500 text-[11px]">3 min usage • 14m ago</span></div>
                    <div class="text-right"><div class="text-[#30D158] font-black text-sm">+$0.30</div><div class="text-gray-600 text-[10px]">@ $485.32</div></div>
                </div>`;
        }

        let pChart;
        function initChart() {
            const ctx = document.getElementById('portfolioChart').getContext('2d');
            let g = ctx.createLinearGradient(0, 0, 0, 220); g.addColorStop(0, 'rgba(48, 209, 88, 0.4)'); g.addColorStop(1, 'rgba(48, 209, 88, 0)');
            pChart = new Chart(ctx, {
                type: 'line',
                data: { labels: Array(10).fill(''), datasets: [{ data: [800, 850, 900, 880, 950, 1050, 1150, 1250, 1350, 1428.50], borderColor: '#30D158', borderWidth: 3, backgroundColor: g, fill: true, tension: 0.45, pointRadius: 0, pointHoverRadius: 6, pointHoverBackgroundColor: '#FFF', pointHoverBorderColor: '#30D158', pointHoverBorderWidth: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false, min: 600 } } }
            });
        }
        function updateChartData(i, b) {
            document.querySelectorAll('.segment-btn').forEach(x => x.classList.remove('active')); b.classList.add('active');
            document.getElementById('timeHighlight').style.transform = `translateX(${i * 100}%)`;
            pChart.data.datasets[0].data = Array(10).fill(0).map(() => 800 + Math.random() * 600); pChart.update();
        }
        function drawSparkline(id, pos) {
            const c = document.getElementById(id); if (!c) return; const ctl = c.getContext('2d'); let d = [10, 12, 11, 14, 13, 16, 15, 18];
            new Chart(ctl, { type: 'line', data: { labels: d.map((_, i) => i), datasets: [{ data: d, borderColor: pos ? '#30D158' : '#EF4444', borderWidth: 2, tension: 0.4, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: false }, y: { display: false } } } });
        }

        window.onload = () => { initChart(); populateHoldings(); populateActivity(); };
    </script>
</body>

</html>
